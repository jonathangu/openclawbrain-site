<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" font-family="Inter, -apple-system, sans-serif">
  <rect width="800" height="240" fill="#0a0a0a" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#f0f0f0" font-size="14" font-weight="700">Three Memory Systems — One Graph</text>

  <!-- Declarative -->
  <rect x="30" y="50" width="230" height="160" rx="10" fill="#111" stroke="#4a9eff" stroke-opacity="0.5"/>
  <text x="145" y="76" text-anchor="middle" fill="#4a9eff" font-size="13" font-weight="700">🧠 Declarative</text>
  <text x="145" y="94" text-anchor="middle" fill="#4a9eff" font-size="10" opacity="0.6">Hippocampus — "What I know"</text>
  <rect x="48" y="108" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="58" y="123" fill="#d4d4d4" font-size="10">"Config changed Feb 21"</text>
  <rect x="48" y="134" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="58" y="149" fill="#d4d4d4" font-size="10">"Bountiful runs on Next.js"</text>
  <rect x="48" y="160" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="58" y="175" fill="#d4d4d4" font-size="10">"Jon prefers data over vibes"</text>
  <text x="145" y="200" text-anchor="middle" fill="#555" font-size="9">Facts · Preferences · Entities</text>

  <!-- Procedural -->
  <rect x="285" y="50" width="230" height="160" rx="10" fill="#111" stroke="#3fb950" stroke-opacity="0.5"/>
  <text x="400" y="76" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">⚡ Procedural</text>
  <text x="400" y="94" text-anchor="middle" fill="#3fb950" font-size="10" opacity="0.6">Basal Ganglia — "What works"</text>
  <rect x="303" y="108" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="313" y="123" fill="#d4d4d4" font-size="10">Check config → logs → rollback</text>
  <rect x="303" y="134" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="313" y="149" fill="#d4d4d4" font-size="10">Never say "clear cache"</text>
  <rect x="303" y="160" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="313" y="175" fill="#d4d4d4" font-size="10">Use Codex --yolo for scoped fixes</text>
  <text x="400" y="200" text-anchor="middle" fill="#555" font-size="9">Rules · Actions · Tool skills</text>

  <!-- Episodic -->
  <rect x="540" y="50" width="230" height="160" rx="10" fill="#111" stroke="#bc8cff" stroke-opacity="0.5"/>
  <text x="655" y="76" text-anchor="middle" fill="#bc8cff" font-size="13" font-weight="700">📖 Episodic</text>
  <text x="655" y="94" text-anchor="middle" fill="#bc8cff" font-size="10" opacity="0.6">Hippocampus+Cortex — "What happened"</text>
  <rect x="558" y="108" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="568" y="123" fill="#d4d4d4" font-size="10">Feb 19: 5 sub-agents, all shipped</text>
  <rect x="558" y="134" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="568" y="149" fill="#d4d4d4" font-size="10">React state bug → reproduced → fixed</text>
  <rect x="558" y="160" width="194" height="22" rx="4" fill="#1e1e1e"/>
  <text x="568" y="175" fill="#d4d4d4" font-size="10">Cache thrash → split API keys</text>
  <text x="655" y="200" text-anchor="middle" fill="#555" font-size="9">Full sequences · Outcomes · Lessons</text>

  <!-- Connecting arrows -->
  <path d="M 260 130 L 285 130" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 515 130 L 540 130" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
