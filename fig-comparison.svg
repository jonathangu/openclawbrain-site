<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="g3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="800" height="360" fill="#0a0a0a" rx="12"/>

  <!-- ===== LEFT: Static RAG ===== -->
  <text x="200" y="28" text-anchor="middle" fill="#f85149" font-size="14" font-weight="700">Standard RAG</text>
  <text x="200" y="44" text-anchor="middle" fill="#777" font-size="10">Flat retrieval — similarity, not relevance</text>

  <!-- Query -->
  <rect x="120" y="58" width="160" height="30" rx="6" fill="#1e1e1e" stroke="#f85149" stroke-opacity="0.5"/>
  <text x="200" y="78" text-anchor="middle" fill="#f85149" font-size="10" font-weight="500">Query: "debug deploy"</text>

  <line x1="200" y1="88" x2="200" y2="108" stroke="#f85149" stroke-width="1" marker-end="url(#a3)" opacity="0.5"/>

  <!-- Embed -->
  <rect x="140" y="112" width="120" height="26" rx="5" fill="#1a0a0a" stroke="#f85149" stroke-opacity="0.3"/>
  <text x="200" y="130" text-anchor="middle" fill="#f85149" font-size="10">embed(query)</text>

  <line x1="200" y1="138" x2="200" y2="158" stroke="#f85149" stroke-width="1" marker-end="url(#a3)" opacity="0.5"/>

  <!-- Flat chunks -->
  <rect x="60" y="162" width="280" height="120" rx="8" fill="#111" stroke="#1e1e1e"/>
  <text x="80" y="180" fill="#555" font-size="9">FLAT DOCUMENT CHUNKS</text>

  <!-- Chunks with similarity scores -->
  <rect x="75" y="190" width="250" height="20" rx="3" fill="#1e1e1e"/>
  <text x="85" y="204" fill="#f85149" font-size="9" opacity="0.8">chunk_42: "server restart procedure" — cos=0.82</text>

  <rect x="75" y="214" width="250" height="20" rx="3" fill="#1e1e1e"/>
  <text x="85" y="228" fill="#888" font-size="9">chunk_17: "deploy pipeline docs" — cos=0.71</text>

  <rect x="75" y="238" width="250" height="20" rx="3" fill="#1e1e1e"/>
  <text x="85" y="252" fill="#555" font-size="9">chunk_89: "config change Feb 21" — cos=0.31 ✗</text>

  <text x="200" y="272" text-anchor="middle" fill="#f85149" font-size="9" opacity="0.6">❌ Missed! Low lexical overlap</text>

  <line x1="200" y1="282" x2="200" y2="302" stroke="#f85149" stroke-width="1" marker-end="url(#a3)" opacity="0.5"/>

  <!-- Result -->
  <rect x="100" y="306" width="200" height="36" rx="6" fill="#1a0a0a" stroke="#f85149" stroke-opacity="0.4"/>
  <text x="200" y="322" text-anchor="middle" fill="#f85149" font-size="10">Returns similar but</text>
  <text x="200" y="336" text-anchor="middle" fill="#f85149" font-size="10" font-weight="600">not the right answer</text>

  <!-- ===== Divider ===== -->
  <line x1="400" y1="20" x2="400" y2="350" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="352" text-anchor="middle" fill="#333" font-size="9">vs.</text>

  <!-- ===== RIGHT: NAM ===== -->
  <text x="600" y="28" text-anchor="middle" fill="#3fb950" font-size="14" font-weight="700">Neural Activation Memory</text>
  <text x="600" y="44" text-anchor="middle" fill="#777" font-size="10">Graph traversal — LLM reasons about relevance</text>

  <!-- Query -->
  <rect x="520" y="58" width="160" height="30" rx="6" fill="#1e1e1e" stroke="#3fb950" stroke-opacity="0.5"/>
  <text x="600" y="78" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="500">Query: "debug deploy"</text>

  <line x1="600" y1="88" x2="600" y2="108" stroke="#3fb950" stroke-width="1" marker-end="url(#a4)" opacity="0.5"/>

  <!-- LLM Activation -->
  <rect x="540" y="112" width="120" height="26" rx="5" fill="#0a1a0a" stroke="#3fb950" stroke-opacity="0.5"/>
  <text x="600" y="130" text-anchor="middle" fill="#3fb950" font-size="10">φ(root, q, ∅)</text>

  <line x1="600" y1="138" x2="600" y2="158" stroke="#3fb950" stroke-width="1" marker-end="url(#a4)" opacity="0.5"/>

  <!-- Graph -->
  <rect x="460" y="162" width="280" height="120" rx="8" fill="#111" stroke="#1e1e1e"/>
  <text x="480" y="180" fill="#555" font-size="9">DIRECTED MEMORY GRAPH</text>

  <!-- Nodes with traversal -->
  <circle cx="510" cy="210" r="12" fill="rgba(63,185,80,0.2)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="510" y="214" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="600">Infra</text>

  <circle cx="580" cy="200" r="10" fill="rgba(63,185,80,0.3)" stroke="#3fb950" stroke-width="2" filter="url(#g3)"/>
  <text x="580" y="204" text-anchor="middle" fill="#3fb950" font-size="7" font-weight="600">Deploy</text>

  <circle cx="650" cy="215" r="14" fill="rgba(63,185,80,0.4)" stroke="#3fb950" stroke-width="2" filter="url(#g3)"/>
  <text x="650" y="212" text-anchor="middle" fill="#3fb950" font-size="7" font-weight="700">Config</text>
  <text x="650" y="222" text-anchor="middle" fill="#3fb950" font-size="7" font-weight="700">Feb 21</text>

  <circle cx="530" cy="250" r="8" fill="#1e1e1e" stroke="#444"/>
  <text x="530" y="253" text-anchor="middle" fill="#555" font-size="6">People</text>

  <circle cx="700" cy="250" r="8" fill="#1e1e1e" stroke="#444"/>
  <text x="700" y="253" text-anchor="middle" fill="#555" font-size="6">Logs</text>

  <!-- Edges -->
  <line x1="522" y1="210" x2="570" y2="200" stroke="#3fb950" stroke-width="2" opacity="0.7"/>
  <line x1="590" y1="200" x2="636" y2="215" stroke="#3fb950" stroke-width="2.5" opacity="0.9"/>
  <line x1="510" y1="222" x2="530" y2="242" stroke="#444" stroke-width="0.5" opacity="0.3"/>
  <line x1="660" y1="227" x2="695" y2="243" stroke="#444" stroke-width="0.5" opacity="0.3"/>

  <!-- Activation pulse on Config -->
  <circle cx="650" cy="215" r="20" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.3">
    <animate attributeName="r" from="16" to="28" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="272" text-anchor="middle" fill="#3fb950" font-size="9">✓ Found via reasoning chain!</text>

  <line x1="600" y1="282" x2="600" y2="302" stroke="#3fb950" stroke-width="1" marker-end="url(#a4)" opacity="0.5"/>

  <!-- Result -->
  <rect x="500" y="306" width="200" height="36" rx="6" fill="#0a1a0a" stroke="#3fb950" stroke-opacity="0.6"/>
  <text x="600" y="322" text-anchor="middle" fill="#3fb950" font-size="10">Finds the config change</text>
  <text x="600" y="336" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">via causal reasoning 🎯</text>
</svg>
