<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="QTsim confidence mixing diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1100" height="560" fill="#FCFAF6"/>
  <text x="70" y="60" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#2B221B" font-weight="700">QTsim + graph_prior Confidence Mixing</text>

  <rect x="75" y="110" width="280" height="120" rx="14" fill="#FFE9D8" stroke="#D99567"/>
  <text x="100" y="160" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#503421" font-weight="700">QTsim(a|q,s)</text>
  <text x="100" y="196" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#5E4030">query-conditioned signal</text>

  <rect x="75" y="280" width="280" height="120" rx="14" fill="#E8EDF5" stroke="#9FB0C8"/>
  <text x="100" y="330" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#2D3D54" font-weight="700">graph_prior(a|s)</text>
  <text x="100" y="366" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#3A4A61">structural prior</text>

  <rect x="430" y="145" width="275" height="230" rx="16" fill="#FFFFFF" stroke="#C8B28E" stroke-width="2"/>
  <text x="458" y="188" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#5A422B" font-weight="700">Confidence gate</text>
  <text x="458" y="230" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#5A422B">lambda = sigmoid(a0 +</text>
  <text x="458" y="262" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#5A422B">a1*margin - a2*entropy)</text>
  <text x="458" y="306" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6C573E">high margin -> more QTsim</text>
  <text x="458" y="332" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#6C573E">high entropy -> more prior</text>

  <rect x="775" y="190" width="250" height="140" rx="16" fill="#EAF7EF" stroke="#87B696"/>
  <text x="800" y="242" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#27583A" font-weight="700">Mixed policy</text>
  <text x="800" y="280" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#27583A">pi = lambda*QTsim +</text>
  <text x="800" y="305" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#27583A">(1-lambda)*graph_prior</text>

  <line x1="355" y1="170" x2="430" y2="205" stroke="#5A422B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="355" y1="340" x2="430" y2="290" stroke="#4B5D79" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="705" y1="260" x2="775" y2="260" stroke="#3D4D42" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
