<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="OpenClawBrain system diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6F9FF"/>
      <stop offset="100%" stop-color="#EDF3FF"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2F4D7A"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <text x="70" y="68" font-family="Helvetica, Arial, sans-serif" font-size="36" fill="#12233E" font-weight="700">OpenClawBrain: Hot Path and Background Learning Loop</text>

  <rect x="70" y="110" width="500" height="500" rx="20" fill="#FFFFFF" stroke="#AFC4E8" stroke-width="3"/>
  <text x="100" y="155" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#17345C" font-weight="700">Runtime Hot Path</text>

  <rect x="105" y="190" width="430" height="90" rx="12" fill="#E9F2FF" stroke="#8FB0E1"/>
  <text x="125" y="245" font-family="Helvetica, Arial, sans-serif" font-size="25" fill="#17345C">Query + Local Embeddings</text>

  <rect x="105" y="315" width="430" height="90" rx="12" fill="#E9F2FF" stroke="#8FB0E1"/>
  <text x="125" y="370" font-family="Helvetica, Arial, sans-serif" font-size="25" fill="#17345C">Router: graph_prior + QTsim</text>

  <rect x="105" y="440" width="430" height="90" rx="12" fill="#E9F2FF" stroke="#8FB0E1"/>
  <text x="125" y="495" font-family="Helvetica, Arial, sans-serif" font-size="25" fill="#17345C">Bounded Context + Response</text>

  <path d="M320 280 L320 315" stroke="#2F4D7A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M320 405 L320 440" stroke="#2F4D7A" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="635" y="110" width="500" height="500" rx="20" fill="#FFFFFF" stroke="#C4B8E8" stroke-width="3"/>
  <text x="665" y="155" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#34215A" font-weight="700">Asynchronous Cold Path</text>

  <rect x="670" y="190" width="430" height="85" rx="12" fill="#F4EEFF" stroke="#B29FD8"/>
  <text x="690" y="242" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#34215A">Replay Buffer + Teacher Labels</text>

  <rect x="670" y="300" width="430" height="85" rx="12" fill="#F4EEFF" stroke="#B29FD8"/>
  <text x="690" y="352" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#34215A">Distillation + Policy Gradient</text>

  <rect x="670" y="410" width="430" height="85" rx="12" fill="#F4EEFF" stroke="#B29FD8"/>
  <text x="690" y="462" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#34215A">Safe Graph Maintain (connect/split/merge)</text>

  <path d="M885 275 L885 300" stroke="#5A3F8A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M885 385 L885 410" stroke="#5A3F8A" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M535 360 C590 360, 615 360, 670 360" stroke="#355D97" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="560" y="340" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#355D97">Shadow logs</text>

  <path d="M670 540 C610 590, 570 600, 510 570" stroke="#7D5AA8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="520" y="630" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#5B3F84">Policy update bundle to next deploy window</text>
</svg>
