<text x="102.0" y="647.0" fill="#97afbf" font-size="16" font-weight="400" font-family="'Space Grotesk', 'Arial', sans-serif" text-anchor="start">Current deterministic result only. This makes the retrieval improvement concrete; it does not prove live OpenClaw task success.</text>
