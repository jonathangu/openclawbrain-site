<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f85149"/></marker>
  </defs>
  <rect width="800" height="200" fill="#0a0a0a" rx="12"/>
  <text x="400" y="24" text-anchor="middle" fill="#f0f0f0" font-size="13" font-weight="700">Myelination Lifecycle — How NAM Generates Its Own Rules</text>

  <!-- Stage 1 -->
  <rect x="20" y="45" width="160" height="100" rx="8" fill="#111" stroke="#d29922" stroke-opacity="0.5"/>
  <text x="100" y="68" text-anchor="middle" fill="#d29922" font-size="11" font-weight="600">① Exploration</text>
  <text x="100" y="86" text-anchor="middle" fill="#888" font-size="9">Full LLM activation</text>
  <text x="100" y="100" text-anchor="middle" fill="#888" font-size="9">Expensive, slow</text>
  <text x="100" y="114" text-anchor="middle" fill="#888" font-size="9">Tries different paths</text>
  <text x="100" y="132" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600">~$0.17/query</text>

  <!-- Arrow -->
  <path d="M 180 95 L 210 95" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#al)"/>

  <!-- Stage 2 -->
  <rect x="215" y="45" width="160" height="100" rx="8" fill="#111" stroke="#4a9eff" stroke-opacity="0.5"/>
  <text x="295" y="68" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="600">② Reinforcement</text>
  <text x="295" y="86" text-anchor="middle" fill="#888" font-size="9">Hebbian edge updates</text>
  <text x="295" y="100" text-anchor="middle" fill="#888" font-size="9">Good paths strengthen</text>
  <text x="295" y="114" text-anchor="middle" fill="#888" font-size="9">Bad paths weaken</text>
  <text x="295" y="132" text-anchor="middle" fill="#4a9eff" font-size="10" font-weight="600">~$0.05/query</text>

  <!-- Arrow -->
  <path d="M 375 95 L 405 95" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#al)"/>

  <!-- Stage 3 -->
  <rect x="410" y="45" width="160" height="100" rx="8" fill="#0d1a0d" stroke="#3fb950" stroke-opacity="0.6"/>
  <text x="490" y="68" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">③ Myelination</text>
  <text x="490" y="86" text-anchor="middle" fill="#888" font-size="9">Path cached as reflex</text>
  <text x="490" y="100" text-anchor="middle" fill="#888" font-size="9">No LLM call needed</text>
  <text x="490" y="114" text-anchor="middle" fill="#888" font-size="9">Instant, free</text>
  <text x="490" y="132" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">~$0.00/query</text>

  <!-- Arrow (degradation) -->
  <path d="M 570 95 L 600 95" stroke="#f85149" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Stage 4 -->
  <rect x="605" y="45" width="170" height="100" rx="8" fill="#111" stroke="#f85149" stroke-opacity="0.4"/>
  <text x="690" y="68" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">④ Degradation</text>
  <text x="690" y="86" text-anchor="middle" fill="#888" font-size="9">Reflex starts failing</text>
  <text x="690" y="100" text-anchor="middle" fill="#888" font-size="9">Environment changed</text>
  <text x="690" y="114" text-anchor="middle" fill="#888" font-size="9">Falls back to ① or ②</text>
  <text x="690" y="132" text-anchor="middle" fill="#f85149" font-size="10" font-weight="600">Adaptive!</text>

  <!-- Loop-back arrow -->
  <path d="M 690 145 C 690 175, 100 175, 100 145" stroke="#555" stroke-width="1" stroke-dasharray="4,3" fill="none" marker-end="url(#al)"/>
  <text x="400" y="178" text-anchor="middle" fill="#555" font-size="9">Re-explore when conditions change — the system never gets permanently stuck</text>
</svg>
